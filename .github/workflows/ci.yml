name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Check repository state
        run: |
          if ls *.sln 1> /dev/null 2>&1; then
            echo "Solution file found. Running .NET build pipeline."
          else
            echo "No solution file found yet. Documentation scaffold only. Skipping .NET build."
          fi

      - name: Restore
        if: ${{ hashFiles('*.sln') != '' }}
        run: dotnet restore

      - name: Build
        if: ${{ hashFiles('*.sln') != '' }}
        run: dotnet build --configuration Release --no-restore

      - name: Test
        if: ${{ hashFiles('*.sln') != '' }}
        run: dotnet test --configuration Release --no-build --verbosity normal
