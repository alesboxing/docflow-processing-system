services:
  postgres:
    image: postgres:16-alpine
    container_name: docflow-postgres
    environment:
      POSTGRES_DB: docflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - docflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/DocFlow.Api/Dockerfile
    container_name: docflow-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=docflow;Username=postgres;Password=postgres
    volumes:
      - docflow-api-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  docflow-postgres-data:
  docflow-api-storage:
